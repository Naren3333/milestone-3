apiVersion: v1
kind: Service
metadata:
  name: moodledb
spec:
  selector:
    app: moodledb
  ports:
    - name: mariadb
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodledb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: moodledb
  template:
    metadata:
      labels:
        app: moodledb
    spec:
      containers:
        - name: moodledb
          image: bitnami/mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "no"
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MARIADB_ROOT_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_NAME
            - name: MARIADB_CHARACTER_SET
              value: utf8mb4
            - name: MARIADB_COLLATE
              value: utf8mb4_unicode_ci
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_PASSWORD
          volumeMounts:
            - name: mariadb-data
              mountPath: /bitnami/mariadb
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -uroot -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -uroot -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data-pvc
