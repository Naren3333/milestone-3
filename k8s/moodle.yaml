apiVersion: v1
kind: Service
metadata:
  name: moodle
spec:
  selector:
    app: moodle
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: bitnamilegacy/moodle:5.0.2
          ports:
            - containerPort: 8080
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "no"
            - name: MOODLE_DATABASE_TYPE
              value: mariadb
            - name: MOODLE_DATABASE_HOST
              value: moodledb
            - name: MOODLE_DATABASE_PORT_NUMBER
              value: "3306"
            - name: MOODLE_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_NAME
            - name: MOODLE_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_USER
            - name: MOODLE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_PASSWORD
            - name: MOODLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_USER
            - name: MOODLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_PASSWORD
            - name: MOODLE_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_EMAIL
            - name: MOODLE_SITE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_SITE_NAME
            - name: MOODLE_DATA_DIR
              value: /bitnami/moodledata
          volumeMounts:
            - name: moodle-data
              mountPath: /bitnami/moodle
            - name: moodledata
              mountPath: /bitnami/moodledata
          readinessProbe:
            httpGet:
              path: /login/index.php
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /login/index.php
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: moodle-data
          persistentVolumeClaim:
            claimName: moodle-data-pvc
        - name: moodledata
          persistentVolumeClaim:
            claimName: moodledata-pvc
