apiVersion: v1
kind: Service
metadata:
  name: moodle
spec:
  type: NodePort
  selector:
    app: moodle
  ports:
    - name: http
      port: 8080
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: chocobar333/esmos-moodlehq:4.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: MOODLE_DATABASE_TYPE
              value: mariadb
            - name: MOODLE_DATABASE_HOST
              value: moodledb
            - name: MOODLE_DATABASE_PORT_NUMBER
              value: "3306"
            - name: MOODLE_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_NAME
            - name: MOODLE_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_USER
            - name: MOODLE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_DATABASE_PASSWORD
            - name: MOODLE_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_USER
            - name: MOODLE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_PASSWORD
            - name: MOODLE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_ADMIN_EMAIL
            - name: MOODLE_SITE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_SITE_NAME
            - name: MOODLE_SHORT_NAME
              value: ESMOS
            - name: MOODLE_WWWROOT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_WWWROOT
            - name: MOODLE_DATA_DIR
              value: /var/moodledata
            - name: MOODLE_REVERSE_PROXY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MOODLE_REVERSE_PROXY
          volumeMounts:
            - name: moodledata
              mountPath: /var/moodledata
          readinessProbe:
            httpGet:
              path: /login/index.php
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /login/index.php
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: moodledata
          persistentVolumeClaim:
            claimName: moodledata-405-pvc
