apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mariadb-ingress
spec:
  podSelector:
    matchLabels:
      app: moodledb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: moodle
      ports:
        - protocol: TCP
          port: 3306
